    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim().toLowerCase();
            if (!msg) return;

            const windowEl = document.getElementById('chatWindow');
            windowEl.innerHTML += `<p><strong>You:</strong> ${input.value}</p>`;

            let reply = "Hi! I'm Nalini Kant's assistant. How can I help you today?";

            if (msg.includes("name") || msg.includes("who are you") || msg.includes("introduce yourself")) {
                reply = "My name is Nalini Kant. I am an Electronics & Communication Engineer, coder, and VLSI enthusiast.";
            }

            else if (msg.includes("skill") || msg.includes("skills") || msg.includes("know") || msg.includes("programming") || msg.includes("technical")) {
                reply = "My technical skills are:\n\n" +
                        "Programming: C, C++, HTML, CSS, JavaScript, Bootstrap\n" +
                        "Database & Tools: MySQL, Git, GitHub\n" +
                        "Software: VS Code, MS Excel, MS Word, MS PowerPoint\n" +
                        "Core Subjects: Digital Circuits, Analog Circuits, Electronics Device and Circuits, Network Theory, Signals and Systems, Communication, Electromagnetic Theory, Control Systems, Digital CMOS VLSI Design";
            }

            else if (msg.includes("education") || msg.includes("study") || msg.includes("degree") || msg.includes("b.tech") || msg.includes("12th") || msg.includes("10th")) {
                reply = "My education:\n\n" +
                        "B.Tech – Electronics & Communication Engineering\n" +
                        "Bihar Engineering University, Patna (Dec 2020 – Aug 2024)\n\n" +
                        "12th (CBSE)\n" +
                        "Satyam International School, Patna (May 2018 – July 2020)\n" +
                        "Subjects: Mathematics, Physics, Chemistry, English, Painting\n\n" +
                        "10th (CBSE)\n" +
                        "R.P.S Public School, Patna (Apr 2017 – May 2018)\n" +
                        "Subjects: Mathematics, Science, Social Science, English, Sanskrit";
            }

            else if (msg.includes("certif") || msg.includes("nptel") || msg.includes("great learning")) {
                reply = "My certifications:\n" +
                        "• Sensor Technologies: Physics Fabrication and Circuits – NPTEL\n" +
                        "• Developing Soft Skills and Personality – NPTEL\n" +
                        "• C Programming Language – Great Learning\n" +
                        "• C++ – Great Learning";
            }

            else if (msg.includes("project") || msg.includes("projects") || msg.includes("voting") || msg.includes("radar")) {
                reply = "My projects:\n\n" +
                        "1. Online Voting System (Dynamic Website)\n" +
                        "   Front-end: HTML, CSS, Bootstrap\n" +
                        "   Back-end: PHP + MySQL\n" +
                        "   Features: JavaScript validations, AJAX\n\n" +
                        "2. Radar Using Ultrasonic Sensor\n" +
                        "   Components: Arduino Uno, Ultrasonic Sensor, Servo Motor\n" +
                        "   Software: Arduino IDE + Processing IDE for GUI";
            }

            else if (msg.includes("achieve") || msg.includes("award") || msg.includes("club")) {
                reply = "Achievements & Awards:\n" +
                        "• Meritorious Student Encouragement Award – Awarded for Performance in Semester Examinations\n" +
                        "• Secretary of College Coding Club";
            }

            else if (msg.includes("contact") || msg.includes("email") || msg.includes("reach") || msg.includes("linkedin") || msg.includes("github")) {
                reply = "Contact information:\n\n" +
                        "Email: nalinikantk@gmail.com\n" +
                        "LinkedIn: https://www.linkedin.com/in/nalinikant1\n" +
                        "GitHub: https://github.com/NaliniKant1";
            }

            else if (msg.includes("resume") || msg.includes("pdf") || msg.includes("download")) {
                reply = "You can download my resume right above this chat — click the green button 'Download Resume' to get resumenk.pdf";
            }

            else {
                reply = "You can ask me about:\n" +
                        "• My name & background\n" +
                        "• Skills & technologies\n" +
                        "• Education\n" +
                        "• Projects\n" +
                        "• Certifications\n" +
                        "• Achievements\n" +
                        "• Contact information\n" +
                        "• Resume download\n\n" +
                        "What would you like to know?";
            }

            windowEl.innerHTML += `<p><strong>Bot:</strong> ${reply}</p>`;
            windowEl.scrollTop = windowEl.scrollHeight;
            input.value = '';
        }
    </script>
