    <script src="script.js"></script>
    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;
            const windowEl = document.getElementById('chatWindow');
            windowEl.innerHTML += `<p><strong>You:</strong> ${msg}</p>`;
            let reply = "Hi! I'm Nalini Kant, an Electronics & Communication Engineer passionate about VLSI and coding. How can I help?";
            if (msg.toLowerCase().includes("name")) reply = "My name is Nalini Kant.";
            if (msg.toLowerCase().includes("skill")) reply = "I know C, C++, HTML, CSS, JavaScript, Bootstrap, MySQL and VLSI design.";
            windowEl.innerHTML += `<p><strong>Bot:</strong> ${reply}</p>`;
            windowEl.scrollTop = windowEl.scrollHeight;
            input.value = '';
        }
    </script>
