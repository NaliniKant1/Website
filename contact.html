    <link rel="stylesheet" href="style.css">
    <style>
        body { background: pink !important; }

        /* Rainbow blinking text */
        .rainbow-blink {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 15px 0;
            animation: rainbow 4s linear infinite, blink 1.8s infinite;
        }

        @keyframes rainbow {
            0%   { color: #ff0000; }
            14%  { color: #ff7f00; }
            28%  { color: #ffff00; }
            42%  { color: #00ff00; }
            57%  { color: #0000ff; }
            71%  { color: #4b0082; }
            85%  { color: #8b00ff; }
            100% { color: #ff0000; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.4; }
        }

        /* Medium size resume photo box */
        .resume-box {
            max-width: 520px;
            margin: 35px auto;
            border: 3px solid #dee2e6;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(0,0,0,0.22);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: white;
        }

        .resume-box:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 40px rgba(0,0,0,0.28);
        }

        .resume-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Modal for enlarged photo */
        #resumeModal .modal-content {
            background: transparent;
            border: none;
        }

        #modalResumeImage {
            max-height: 92vh;
            width: auto;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* Footer social icons style (same as gallery) */
        .social-icons a {
            font-size: 2.2rem;
            margin: 0 14px;
            color: #333;
            transition: all 0.25s;
        }
        .social-icons a:hover {
            color: #0d6efd;
            transform: scale(1.18);
        }
        .footer-yellow {
            background-color: #fff3cd;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            display: inline-block;
            margin-top: 12px;
        }
    </style>
</head>
